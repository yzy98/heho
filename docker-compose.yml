services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: heho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heho
      POSTGRES_PASSWORD: heho
      POSTGRES_DB: heho
    ports:
      - "5432:5432"
    volumes:
      - heho_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heho -d heho"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: heho-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - heho_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  heho_postgres_data:
  heho_redis_data:
